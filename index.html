<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --azul: #00d4ff;
            --fundo: #020b14;
            --painel: rgba(0,212,255,0.05);
            --borda: rgba(0,212,255,0.2);
            --texto: #c8f0ff;
        }

        body {
            background: var(--fundo);
            color: var(--texto);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px 40px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
            z-index: 0;
        }

        .wrap { position: relative; z-index: 1; width: 100%; max-width: 680px; }

        header { text-align: center; margin-bottom: 28px; }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.4rem, 10vw, 4rem);
            font-weight: 900;
            letter-spacing: .22em;
            background: linear-gradient(135deg, #fff 30%, var(--azul));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 16px rgba(0,212,255,.55));
        }

        .subtitulo {
            font-size: .62rem;
            letter-spacing: .3em;
            color: rgba(0,212,255,.5);
            margin-top: 5px;
            text-transform: uppercase;
        }

        .anel-wrap { display: flex; justify-content: center; margin-bottom: 26px; }

        .anel {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 1.5px solid rgba(0,212,255,.18);
            display: flex; align-items: center; justify-content: center;
            position: relative;
            transition: border-color .3s;
        }

        .anel::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 1.5px solid rgba(0,212,255,.35);
            animation: girar 3s linear infinite;
        }

        .anel::after {
            content: '';
            position: absolute; inset: 14px;
            border-radius: 50%;
            border: 1px solid rgba(0,212,255,.2);
            animation: girar 6s linear infinite reverse;
        }

        @keyframes girar { to { transform: rotate(360deg); } }
        @keyframes pulsar {
            from { transform: scale(1); filter: drop-shadow(0 0 8px #00d4ff); }
            to   { transform: scale(1.2); filter: drop-shadow(0 0 26px #00d4ff); }
        }

        .anel-icon { font-size: 2.2rem; z-index: 1; }
        .anel.falando { border-color: rgba(0,212,255,.6); }
        .anel.falando .anel-icon { animation: pulsar .55s ease-in-out infinite alternate; }

        .painel {
            background: var(--painel);
            border: 1px solid var(--borda);
            border-radius: 4px;
            padding: 18px;
            margin-bottom: 14px;
            position: relative;
        }

        .painel::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 32px; height: 32px;
            border-top: 2px solid var(--azul);
            border-left: 2px solid var(--azul);
        }

        .painel::after {
            content: '';
            position: absolute; bottom: 0; right: 0;
            width: 32px; height: 32px;
            border-bottom: 2px solid var(--azul);
            border-right: 2px solid var(--azul);
        }

        .label {
            font-size: .62rem;
            letter-spacing: .2em;
            color: var(--azul);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            background: rgba(0,212,255,.06);
            border: 1px solid rgba(0,212,255,.25);
            border-radius: 3px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: .9rem;
            padding: 10px 12px;
            outline: none;
            resize: none;
            height: 72px;
            line-height: 1.6;
        }

        textarea::placeholder { color: rgba(200,240,255,.28); }
        textarea:focus { border-color: var(--azul); box-shadow: 0 0 10px rgba(0,212,255,.2); }

        .btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--azul);
            color: var(--azul);
            font-family: 'Orbitron', sans-serif;
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .08em;
            padding: 12px 8px;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background .15s, color .15s, box-shadow .15s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active, .btn:hover {
            background: var(--azul);
            color: var(--fundo);
            box-shadow: 0 0 20px rgba(0,212,255,.5);
        }

        .btn:disabled { opacity: .35; pointer-events: none; }

        .btn-falar { border-color: #00ffaa; color: #00ffaa; }
        .btn-falar:active, .btn-falar:hover {
            background: #00ffaa;
            color: var(--fundo);
            box-shadow: 0 0 20px rgba(0,255,170,.5);
        }

        .voz-info {
            font-size: .6rem;
            color: rgba(0,212,255,.45);
            margin-top: 10px;
            line-height: 1.6;
        }

        .resposta {
            background: var(--painel);
            border: 1px solid var(--borda);
            border-radius: 4px;
            padding: 18px;
            min-height: 90px;
            font-size: .88rem;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .placeholder { color: rgba(200,240,255,.22); font-style: italic; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: .58rem;
            letter-spacing: .1em;
            color: rgba(0,212,255,.38);
        }

        #statusMsg { transition: color .3s; }
        #statusMsg.ativo   { color: var(--azul); }
        #statusMsg.falando { color: #00ffaa; }
        #statusMsg.erro    { color: #ff5555; }
    </style>
</head>
<body>
<div class="wrap">

    <header>
        <div class="logo">JARVIS</div>
        <div class="subtitulo">Just A Rather Very Intelligent System</div>
    </header>

    <div class="anel-wrap">
        <div class="anel" id="anel">
            <span class="anel-icon">🤖</span>
        </div>
    </div>

    <div class="painel">
        <div class="label">▸ Entrada de Comando</div>
        <textarea id="comando" placeholder="O que deseja saber, senhor?"></textarea>
        <div class="btns">
            <button class="btn" id="btnEnviar" onclick="enviar()">⚡ Enviar</button>
            <button class="btn btn-falar" id="btnFalar" onclick="falarManual()" disabled>🔊 Ouvir</button>
        </div>
        <div class="voz-info" id="vozInfo">Carregando vozes…</div>
    </div>

    <div class="resposta" id="resposta">
        <span class="placeholder">Aguardando comando, senhor.</span>
    </div>

    <div class="status-bar">
        <span id="statusMsg">SISTEMA ONLINE</span>
        <span id="statusDir">JARVIS v2.0</span>
    </div>

</div>
<script>
    let ultimaResposta = "";
    let vozEscolhida = null;

    function escolherVoz() {
        if (!('speechSynthesis' in window)) return;
        const vozes = window.speechSynthesis.getVoices();
        if (!vozes.length) return;

        const candidatos = [
            vozes.find(v => v.lang === 'pt-BR' && v.name.toLowerCase().includes('male')),
            vozes.find(v => v.lang === 'pt-BR'),
            vozes.find(v => v.lang.startsWith('pt')),
            vozes.find(v => v.default),
            vozes[0],
        ];

        vozEscolhida = candidatos.find(v => v != null);
        const ptCount = vozes.filter(v => v.lang.startsWith('pt')).length;
        document.getElementById('vozInfo').textContent =
            '🎙 ' + (vozEscolhida ? vozEscolhida.name : 'padrão') +
            ' | vozes pt: ' + ptCount + '/' + vozes.length;
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = escolherVoz;
        escolherVoz();
    } else {
        document.getElementById('vozInfo').textContent = '⚠ TTS não disponível';
    }

    function falar(texto) {
        if (!('speechSynthesis' in window) || !texto) return;
        window.speechSynthesis.cancel();
        const fala = new SpeechSynthesisUtterance(texto);
        fala.lang  = 'pt-BR';
        fala.rate  = 0.88;
        fala.pitch = 0.75;
        if (vozEscolhida) fala.voice = vozEscolhida;

        const anel = document.getElementById('anel');
        const st   = document.getElementById('statusMsg');

        fala.onstart = () => { anel.classList.add('falando'); st.textContent = '🔊 REPRODUZINDO…'; st.className = 'falando'; };
        fala.onend   = () => { anel.classList.remove('falando'); st.textContent = 'PRONTO'; st.className = ''; };
        fala.onerror = (e) => { anel.classList.remove('falando'); st.textContent = 'ERRO TTS'; st.className = 'erro'; };

        window.speechSynthesis.speak(fala);
    }

    function falarManual() {
        if (ultimaResposta) falar(ultimaResposta);
    }

    async function enviar() {
        const input  = document.getElementById('comando');
        const div    = document.getElementById('resposta');
        const btnEnv = document.getElementById('btnEnviar');
        const btnFal = document.getElementById('btnFalar');
        const st     = document.getElementById('statusMsg');
        const texto  = input.value.trim();

        if (!texto) { div.innerHTML = '<span class="placeholder">Digite algo primeiro, senhor.</span>'; return; }

        btnEnv.disabled = true;
        btnFal.disabled = true;
        div.textContent = '⏳ Processando…';
        st.textContent = 'AGUARDANDO RESPOSTA…';
        st.className = 'ativo';

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: texto })
            });

            const dados = await res.json();
            if (dados.error) throw new Error(dados.error);

            ultimaResposta = dados.reply;
            div.textContent = ultimaResposta;
            st.textContent = 'RESPOSTA RECEBIDA — toque 🔊 para ouvir';
            st.className = '';
            btnFal.disabled = false;

        } catch (e) {
            div.textContent = '⚠ Erro: ' + e.message;
            st.textContent = 'FALHA';
            st.className = 'erro';
        } finally {
            btnEnv.disabled = false;
        }
    }

    document.getElementById('comando').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
    });
</script>
</body>
</html>
